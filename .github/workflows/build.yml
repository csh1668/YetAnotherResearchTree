name: Build YART

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # Release 생성에 필요

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # 게임이 설치돼 있지 않은 러너에서는 csproj가 NuGet 폴백 참조(Krafs.Rimworld.Ref / Lib.Harmony /
    # Microsoft.NETFramework.ReferenceAssemblies)로 빌드한다. MP API(0MultiplayerAPI.dll)는 repo의 Refs/에 벤더링됨.
    - name: Restore NuGet packages
      run: msbuild Source/YART/YART.csproj -t:Restore -p:Configuration=Release-1.6

    - name: Build
      run: msbuild Source/YART/YART.csproj -t:Build -p:Configuration=Release-1.6 -nologo

    - name: Check build output
      run: |
        if (Test-Path "Assemblies/YART.dll") {
          Write-Host "Build successful! YART.dll found."
          Get-Item "Assemblies/YART.dll" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "Build failed! YART.dll not found."
          exit 1
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: YART-Assembly
        path: Assemblies/YART.dll
        retention-days: 7

    # ---- main push에서만: 모드 전체를 zip으로 묶어 Release 배포 (비스팀 유저용) ----
    - name: Package mod
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        $stage = "dist/YetAnotherResearchTree"
        New-Item -ItemType Directory -Force -Path $stage | Out-Null
        # 런타임 파일만 포함 (Source/Refs/.github 등 개발 파일 제외)
        Copy-Item -Recurse -Force About, Assemblies, Languages, Textures $stage
        Remove-Item -Force "$stage/Assemblies/.gitkeep" -ErrorAction SilentlyContinue
        Compress-Archive -Path $stage -DestinationPath YetAnotherResearchTree.zip -Force
        Get-Item YetAnotherResearchTree.zip | Select-Object Name, Length

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: YetAnotherResearchTree.zip
        generate_release_notes: true   # 직전 release 이후 커밋/PR로 변경 사항 자동 작성
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
