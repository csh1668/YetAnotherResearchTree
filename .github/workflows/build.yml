name: Build YART

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore Source/YART/YART.csproj
      
    - name: Build project
      run: dotnet build Source/YART/YART.csproj -c Release-1.6 --no-incremental
      
    - name: Check build output
      run: |
        if (Test-Path "Assemblies/YART.dll") {
          Write-Host "Build successful! YART.dll found."
          Get-Item "Assemblies/YART.dll" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "Build failed! YART.dll not found."
          exit 1
        }
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: YART-Assembly
        path: Assemblies/YART.dll
        retention-days: 7
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: Assemblies/YART.dll
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
