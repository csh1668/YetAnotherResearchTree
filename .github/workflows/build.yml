name: Build YART

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # Release 생성에 필요

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # 게임이 설치돼 있지 않은 러너에서는 csproj가 NuGet 폴백 참조(Krafs.Rimworld.Ref / Lib.Harmony /
    # Microsoft.NETFramework.ReferenceAssemblies)로 빌드한다. MP API(0MultiplayerAPI.dll)는 repo의 Refs/에 벤더링됨.
    - name: Restore NuGet packages
      run: msbuild Source/YART/YART.csproj -t:Restore -p:Configuration=Release-1.6

    - name: Build
      run: msbuild Source/YART/YART.csproj -t:Build -p:Configuration=Release-1.6 -nologo

    - name: Check build output
      run: |
        if (Test-Path "Assemblies/YART.dll") {
          Write-Host "Build successful! YART.dll found."
          Get-Item "Assemblies/YART.dll" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "Build failed! YART.dll not found."
          exit 1
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: YART-Assembly
        path: Assemblies/YART.dll
        retention-days: 7

    # ---- main push에서만: 모드 전체를 zip으로 묶어 Release 배포 (비스팀 유저용) ----
    - name: Package mod
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        $stage = "dist/YetAnotherResearchTree"
        New-Item -ItemType Directory -Force -Path $stage | Out-Null
        # 런타임 파일만 포함 (Source/Refs/.github 등 개발 파일 제외)
        Copy-Item -Recurse -Force About, Assemblies, Languages, Textures $stage
        Remove-Item -Force "$stage/Assemblies/.gitkeep" -ErrorAction SilentlyContinue
        Compress-Archive -Path $stage -DestinationPath YetAnotherResearchTree.zip -Force
        Get-Item YetAnotherResearchTree.zip | Select-Object Name, Length

    # 릴리스 이름 = KST 날짜(2026-06-17). 같은 날 여러 번 빌드해도 충돌 없도록 태그엔 시각(HHmm)을 붙임.
    - name: Determine release name (KST date)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: ver
      shell: pwsh
      run: |
        $kst = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId([DateTime]::UtcNow, 'Korea Standard Time')
        Add-Content -Path $env:GITHUB_OUTPUT -Value "date=$($kst.ToString('yyyy-MM-dd'))"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$($kst.ToString('yyyy-MM-dd-HHmm'))"

    - name: Build changelog (commits since previous release)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: changelog
      shell: pwsh
      run: |
        $prev = git describe --tags --abbrev=0 2>$null
        if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($prev)) {
          $prev = "initial"
          $log = git log HEAD --no-merges --pretty=format:"- %s (%h)"
        } else {
          $log = git log "$prev..HEAD" --no-merges --pretty=format:"- %s (%h)"
        }
        if ([string]::IsNullOrWhiteSpace($log)) { $log = "- (no changes)" }

        # 템플릿 읽어 자리표시자 치환
        $body = Get-Content -Raw -Path ".github/release-template.md"
        $body = $body.Replace("{{PREV}}", $prev).Replace("{{COMMITS}}", $log)

        # 멀티라인 값은 heredoc 구분자로 GITHUB_OUTPUT에 안전하게 기록
        $delim = "CHANGELOG_EOF"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<$delim"
        Add-Content -Path $env:GITHUB_OUTPUT -Value $body
        Add-Content -Path $env:GITHUB_OUTPUT -Value $delim

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.tag }}
        name: ${{ steps.ver.outputs.date }}
        files: YetAnotherResearchTree.zip
        body: ${{ steps.changelog.outputs.body }}   # 커밋 리스트 (생성 노트 앞에 prepend됨)
        generate_release_notes: true                # 그 아래에 'Full Changelog' 비교 링크 자동 추가
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
